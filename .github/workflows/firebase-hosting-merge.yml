name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "26"
          cache: npm

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Setup Hugo
        # v3.2.1
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78
        with:
          hugo-version: latest
          extended: true

      - name: Build website
        run: hugo --minify --gc

      - name: Build search index
        run: npm run build:search

      - name: Upload website artifact
        # v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: firebase-hosting
          path: |
            public
            firebase.json
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download website artifact
        # v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: firebase-hosting
          path: .

      - name: Deploy to Firebase Hosting
        # v0.11.0
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BODROVIS }}
          channelId: live
          projectId: bodrovis