<!DOCTYPE html>
{{ $lang := default "en-US" (or .Params.lang .Site.Language.Locale) }}
<html lang="{{ $lang }}">

<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  {{ partial "meta.html" . }}

  {{ block "css" . }}
  {{ end }}
</head>

<body>
  {{ block "main" . }}
  {{ end }}

  {{ block "footer" . }}
  {{ end }}
</body>

</html>
